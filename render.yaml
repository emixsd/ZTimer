services:
  - type: web
    name: ztimer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: ZENDESK_SUBDOMAIN
        sync: false
      - key: ZENDESK_EMAIL
        sync: false
      - key: ZENDESK_API_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: TARGET_TICKET_FORM_IDS
        value: "52281638323859"
      - key: COUNTRY_CUSTOM_FIELD_ID
        value: "44008169716755"
      # Vazio = conta todo o tempo em pending (preencha para filtrar por tag).
      - key: RESPONSE_PENDING_TAGS
        value: ""
      - key: DATABASE_URL
        value: "sqlite:///metrics.db"
      - key: DEFAULT_SYNC_QUERY
        value: "type:ticket"
      - key: PENDING_TIMER_LOOP_ENABLED
        value: "true"
      - key: PENDING_TIMER_LOOP_INTERVAL_SECONDS
        value: "300"
      # Sem status:pending de propósito: cobre a saída de pending pela tag
      # de armado quando o webhook Cancelar falha.
      - key: PENDING_TIMER_SYNC_QUERY
        value: "type:ticket tags:tmr_pendente_armado"
      - key: PENDING_SLA_MINUTES
        value: "60"
      - key: EXPORT_DIR
        value: "exports"
      - key: RESPONSE_EXPORT_FILENAME
        value: "respostas_solicitantes.csv"
      # Relatório diário por e-mail + retenção de 24h.
      - key: REPORT_EMAIL_ENABLED
        value: "true"
      - key: REPORT_EMAIL_TO
        sync: false
      - key: REPORT_SEND_HOUR
        value: "18"
      - key: REPORT_TIMEZONE
        value: "America/Sao_Paulo"
      - key: RETENTION_HOURS
        value: "24"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FLASK_DEBUG
        value: "false"
